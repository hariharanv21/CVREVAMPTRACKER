<!DOCTYPE html>
<html>
<head>
  <title>Bug Tracker</title>
</head>
<body style="font-family: Arial; padding:20px;">

<h2>CV Revamp Bug Tracker</h2>

<button onclick="loadBugs()">Load Bugs</button>

<pre id="output"></pre>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyxxGseC6is_0g3PN-aCeJyemUby_jBH5FYwx4XbGdXbkbHXlIUZ5osv8Rs0ZxOe3Us/exec";

function loadBugs() {
  fetch(API_URL)
    .then(res => res.json())
    .then(data => {
      document.getElementById("output").textContent =
        JSON.stringify(data, null, 2);
    })
    .catch(err => alert(err));
}
</script>

</body>
</html>
