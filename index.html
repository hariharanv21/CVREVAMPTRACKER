<!DOCTYPE html>
<html>
<head>
  <title>CV Revamp Bug Tracker</title>
  <style>
    body { font-family: Arial; padding:20px; }
    table { border-collapse: collapse; width:100%; margin-top:20px; }
    th, td { border:1px solid #ddd; padding:8px; }
    th { background:#333; color:white; }
    button { padding:8px 15px; margin-top:10px; }
  </style>
</head>
<body>

<h2>CV Revamp Bug Tracker</h2>

<button onclick="loadBugs()">Load Bugs</button>

<table id="table">
  <thead>
    <tr>
      <th>ID</th>
      <th>Type</th>
      <th>Screen</th>
      <th>Priority</th>
      <th>Status</th>
      <th>Description</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbx3MA8cg5dIWs_NbhEapMfdKTmDZHfVmK_pRFap7tu9or8MMbHfW0nHd-lfuimyR8HR/exec";

function loadBugs() {
  fetch(API_URL)
    .then(res => res.json())
    .then(data => {
      const tbody = document.querySelector("#table tbody");
      tbody.innerHTML = "";

      data.bugs.forEach(bug => {
        const row = `<tr>
          <td>${bug.id}</td>
          <td>${bug.type}</td>
          <td>${bug.screen}</td>
          <td>${bug.priority}</td>
          <td>${bug.status}</td>
          <td>${bug.description}</td>
        </tr>`;
        tbody.innerHTML += row;
      });
    })
    .catch(err => alert(err));
}
</script>

</body>
</html>
